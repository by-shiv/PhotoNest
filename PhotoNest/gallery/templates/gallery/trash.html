{% extends 'gallery/base.html' %}
{% block title %}Thrash | PhotoNest{% endblock %}
{% block content %}
    <h2>Recently Deleted</h2>
    <div class="image-grid">
        {% for img in images %}
            {% if img.image %}
                <div class="image-card" style="background-image:url('{{ img.image.url }}');"></div>
            {% endif %}
        {% empty %}<p>Thrash is empty</p>
        {% endfor %}
    </div>
{% endblock %}
