{% extends 'gallery/base.html' %}

{% block title %}
  Favorites | PhotoNest
{% endblock %}

{% block content %}
  <div class="page-header">
    <h2>Your Favorites</h2>
    <p class="page-subtitle">Images you’ve marked as favorite</p>
  </div>

  <div class="image-grid">
    {% for img in images %}
      {% if img.image %}
        <div class="image-card" id="img-{{ img.id }}" style="background-image:url('{{ img.image.url }}');">
          <a href="{% url 'image_detail' img.id %}" class="image-link-overlay"></a>

          <div class="card-actions">
            <!-- ❤️ FAVORITE -->
            <form method="post" action="{% url 'toggle_favorite' img.id %}" onclick="event.stopPropagation();">
              {% csrf_token %}
              <button type="submit" class="action-btn fav-btn">
                {% if img.favorite %}
                  <span class="heart active">❤</span>
                {% else %}
                  <span class="heart">♡</span>
                {% endif %}
              </button>
            </form>

            <!-- ✔ SELECT -->
            <button class="action-btn select-btn" onclick="showImageMenu({{ img.id }}); event.stopPropagation();">✔</button>
          </div>
        </div>
      {% endif %}
    {% empty %}
      <div class="empty-state">
        <p>No favorites yet</p>
      </div>
    {% endfor %}
  </div>
{% endblock %}
