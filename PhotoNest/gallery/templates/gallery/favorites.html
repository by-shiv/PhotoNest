{% extends 'gallery/base.html' %}
{% block title %}
  Favorites | PhotoNest
{% endblock %}
{% block content %}
  <h2>Your Favorites</h2>
  <div class="image-grid">
    {% for img in images %}
      {% if img.image %}
        <div class="image-card" id="img-{{ img.id }}" style="background-image:url('{{ img.image.url }}'); position: relative;">
          <a href="{% url 'image_detail' img.id %}" class="image-link-overlay"></a>
          <div class="card-actions">
            <form method="post" action="{% url 'toggle_favorite' img.id %}" style="display:inline;">
              {% csrf_token %}
              <button type="submit" class="fav-btn" title="Add to Favorites">
                {% if img.favorite %}
                  <span style="color:red;">&#10084;</span>
                {% else %}
                  &#9825;
                {% endif %}
              </button>
            </form>
            <button type="button" class="select-btn" title="Select" onclick="showImageMenu({{ img.id }});">&#10003;</button>
          </div>
        </div>
      {% endif %}
    {% empty %}
      <p>No favorites yet!</p>
    {% endfor %}
  </div>
{% endblock %}
