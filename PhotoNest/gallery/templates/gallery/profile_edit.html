{% extends 'gallery/base.html' %}

{% block content %}
  <div class="form-wrap">
    <div class="form-card">
      <h2>Edit Profile</h2>
      <p class="form-subtitle">Update your personal details</p>

      <form method="post" enctype="multipart/form-data" class="profile-form">
        {% csrf_token %}

        <!-- USER FIELDS -->
        <div class="form-group">{{ user_form.as_p }}</div>

        <!-- PROFILE PIC -->
        <div class="form-group">
          <label>Profile Picture</label>
          {{ profile_form.profile_pic }}
          <img id="profile-preview" style="width:80px; border-radius:50%; margin-top:10px; display:none;" />
        </div>

        <!-- ACTIONS -->
        <div class="form-actions">
          <button type="submit" class="btn btn-primary">Save Changes</button>
          <a href="{% url 'profile' %}" class="btn btn-secondary">Cancel</a>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
