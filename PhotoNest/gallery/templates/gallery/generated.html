{% extends 'gallery/base.html' %}

{% block title %}
  Generated Images
{% endblock %}

{% block content %}
  <h2>Generated Images</h2>

  <div class="image-grid">
    {% for img in images %}
      <a href="{% url 'generated_detail' img.id %}">
        <div class="image-card" style="background-image:url('{{ img.image.url }}'); position:relative;">
          <div class="image-overlay"></div>
          <div style="position:absolute; bottom:0; left:0; right:0; background: rgba(0,0,0,0.6); color:white; padding:6px; font-size:14px;">
            {{ img.title }}
          </div>
        </div>
      </a>
    {% empty %}
      <p>No generated images yet.</p>
    {% endfor %}
  </div>
{% endblock %}
