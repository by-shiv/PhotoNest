{% load static %}
<!DOCTYPE html>
<html>
  <head>
    <title>Verify Account</title>

    <link rel="stylesheet" href="{% static 'css/auth.css' %}" />
  </head>
  <body>
    <div class="auth-page">
      <div class="auth-card">
        {% if messages %}
          {% for message in messages %}
            <div class="message {{ message.tags }}">{{ message }}</div>
          {% endfor %}
        {% endif %}

        <h2>Verify Account</h2>

        <p style="
            text-align:center;
            color:#666;
            margin-bottom:20px;
        ">Enter your registered email to receive a new verification OTP.</p>

        <form method="POST">
          {% csrf_token %}

          <input type="email" name="email" placeholder="Enter your email" required />

          <button type="submit">Send Verification OTP</button>
        </form>

        <div class="auth-link">
          <a href="{% url 'root_auth' %}">Back to Login</a>
        </div>
      </div>
    </div>
  </body>
</html>
